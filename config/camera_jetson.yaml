# Jetson — default to onboard/USB camera at device index 0.
# For CSI cameras (e.g. IMX219), use the GStreamer pipeline string below.

camera:
  source: 0     # USB or first available camera
  # CSI camera via GStreamer (uncomment for Jetson CSI cam):
  # source: "nvarguscamerasrc sensor-id=0 ! video/x-raw(memory:NVMM),
  #           width=1280,height=720,framerate=30/1 !
  #           nvvidconv flip-method=0 !
  #           video/x-raw,format=BGRx !
  #           videoconvert !
  #           video/x-raw,format=BGR !
  #           appsink drop=1"
  width: 1280
  height: 720
  fps: 30

display:
  window_title: "Optical Flow [Jetson]"
  show_fps: true
# Ubuntu — default to Droidcam over WiFi.
# Change the IP to match what the Droidcam app shows on your phone.

camera:
  # source: "http://192.168.1.100:4747/video"   # Droidcam HTTP stream
  # source: "rtsp://192.168.1.100:4747/h264_ulaw.sdp"  # RTSP (better quality)
  source: 0    # uncomment to use built-in laptop camera instead
  width: 1280
  height: 720
  fps: 30

display:
  window_title: "Optical Flow [Ubuntu - Droidcam]"
  show_fps: true
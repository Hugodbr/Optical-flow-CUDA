%YAML:1.0
---


# Camera configuration
# source can be:
#   - An integer index:           0  (built-in), 1  (USB)
#   - A Droidcam HTTP stream:     http://192.168.1.X:4747/video
#   - A Droidcam RTSP stream:     rtsp://192.168.1.X:4747/h264_ulaw.sdp
#   - A GStreamer pipeline string (advanced)


camera:
  source: 0          # Default: built-in/first camera
  width: 1280
  height: 720
  fps: 30

display:
  window_title: "Optical Flow"
  show_fps: true